item.copper.description = Используется во всех типах построек и боеприпасов.
item.copper.details = Тот самый ультимативный читкод, которым Целико Рия выжигала ЯПК.
item.lead.description = Бесполезный кусок руды, созданный забивать конвейеры.
item.lead.details = Плотный. Инертный. Широко используется в аккумуляторах.\nПримечание: Вероятно, токсичен для биологических форм жизни. Не то чтобы их здесь много осталось.
item.metaglass.description = Хрупкий композит. Абсолютно бесполезен в защите, но без него ты физически не сможешь подвести хладагент к реакторам.
item.graphite.description = Сухой, хрустящий, идеален для разгона средней артиллерии.
item.sand.description = Ресурс, который нужен для каждого второго продвинутого завода. Главная причина, почему твоя база превращается в лабиринт из переплетенных конвейерных лент.
item.coal.description = То, что токсики воруют с твоих заводов, чтобы жечь энергосеть.
item.coal.details = Похоже, что это окаменевшее растительное вещество, образовавшееся задолго до Посева.
item.titanium.description = Забудь про него, конвейеры на Эреккире всё равно круче.
item.thorium.description = Создан исключительно для того, чтобы устроить БУМ на твоей базе.
item.scrap.description = Мусор, из которого взрослые инженеры переплавляют любую имбу.
item.scrap.details = Остатки старых построек и единиц.
item.silicon.description = Главное проклятие. Сколько ни строй заводов, его сожрут процессоры выпендрёжников.
item.plastanium.description = Отстойный зеленый пластик, который вечно лень копить.
item.phase-fabric.description = Магические нити. Стоит запустить их производство, как твои аккумуляторы мгновенно опустеют.
item.surge-alloy.description = Сверхдорогая фиговина. Его наличие в ядре означает, что ты либо задушил всю карту, либо отключил логику заводов юнитов ради пафосных стен.
item.spore-pod.description = Синтетическая биомасса, которая работает как отличное топливо. Ровно до тех пор, пока ты случайно не пропустишь один затор на линии воды. После этого вся твоя энергосеть мгновенно отключается.
item.spore-pod.details = Споры. Похоже, являются синтетической формой жизни. Выделяют газы, токсичные для других биологических форм жизни. Чрезвычайно инвазивны. Легко воспламеняются при определённых условиях.
item.blast-compound.description = Вещество с отрицательным IQ. Взрывается прямо на конвейерной ленте, если рядом упал случайный снаряд противника.
item.pyratite.description = Адская смесь. Если заправить ей копеечный огнемет Scorch, он превращается в плазменный аннигилятор, который испаряет Т5 боссов быстрее, чем дальнобойная артиллерия.
item.beryllium.description = Если повернуть эту иконку на 90 градусов, на тебя посмотрит предатель.
item.tungsten.description = Тяжелый металл. Чтобы его добыть, тебе нужно построить три этажа заводов газов и труб, проклиная геометрию Эреккира.
item.oxide.description = Твёрдый белый порошок, получаемый путем варки бериллия в озоне. Официальный белый скафандр для наших квадратных космических предателей. Без него ты физически не построишь ни один продвинутый завод.
item.carbide.description = Топовый сплав Эреккира, чья иконка — это второй Амогус, замаскированный под хардкорный инженеринг.

liquid.water.description = Используется для охлаждения машин и переработки отходов.
liquid.slag.description = Может быть переработан в разделителе на составляющие металлы или распылён на врагов в качестве оружия.
liquid.oil.description = Используется в производстве продвинутых материалов и как зажигательный боеприпас.
liquid.cryofluid.description = Используется в качестве охлаждающей жидкости для реакторов, турелей и фабрик.
liquid.arkycite.description = Используется в химических реакциях для производства электроэнергии и синтеза материалов.
liquid.ozone.description = Используется как окислитель в производстве материалов и как топливо. Умеренно взрывоопасен.
liquid.hydrogen.description = Используется при добыче ресурсов, производстве единиц и ремонте конструкций. Легковоспламеняющийся.
liquid.cyanogen.description = Используется для боеприпасов, строительства продвинутых единиц и различных реакций в продвинутых блоках. Легковоспламеняющиеся.
liquid.nitrogen.description = Используется при добыче ресурсов и производстве единиц. Инертный.
liquid.neoplasm.description = Опасный биологический побочный продукт Неоплазмового реактора. Быстро распространяется на любой соседний блок, содержащий воду, повреждая его в процессе. Вязкая.
liquid.neoplasm.details = Неоплазма. Неконтролируемая масса быстро делящихся синтетических клеток с консистенцией, напоминающей осадок. Термостойкая. Чрезвычайно опасна для любых построек, связанных с водой.\n\nСлишком сложна и нестабильна для стандартного анализа. Потенциальное применение неизвестно. Рекомендуется сжигание в шлаковых бассейнах.

block.derelict = \uf77e [lightgray]Заброшенный

block.scorch.description = Сжигает любых наземных врагов рядом с ним. Высокоэффективен на близком расстоянии. [orange]Scorch is OP![] Переживет раш Т5 боссов. Повтори прохождение Целико Рии, если ты Сигма. ( ͡° ͜ʖ ͡°)
